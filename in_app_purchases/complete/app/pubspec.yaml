name: dashclicker
description: A codelab for in-app purchases
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cloud_firestore: ^6.3.0
  cupertino_icons: ^1.0.9
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  http: ^1.6.0
  in_app_purchase: ^3.2.3
  intl: ^0.20.2
  logging: ^1.3.0
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  in_app_purchase_platform_interface: ^1.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/
