name: intro_to_genui rebuild script
steps:
  - name: step_03
    steps:
      - name: Remove generated code
        rmdir: step_03
      - name: Create project
        flutter: create -e intro_to_genui
      - name: Add dependencies
        path: intro_to_genui
        flutter: pub add firebase_ai firebase_core genui json_schema_builder
      - name: Strip DEVELOPMENT_TEAM
        strip-lines-containing: DEVELOPMENT_TEAM =
        path: intro_to_genui/ios/Runner.xcodeproj/project.pbxproj
      - name: Configure analysis_options.yaml
        path: intro_to_genui/analysis_options.yaml
        replace-contents: |
          include: ../../analysis_options.yaml
      - name: dart fix
        path: intro_to_genui
        dart: fix --apply
      - name: Remove README
        rm: intro_to_genui/README.md
      - name: Add .gemini directory
        mkdir: intro_to_genui/.gemini
      - name: Add .gemini/settings.json
        path: intro_to_genui/.gemini/settings.json
        replace-contents: |
          {
              "mcpServers": {
                  "dart": {
                      "command": "dart",
                      "args": [
                          "mcp-server"
                      ]
                  }
              }
          }
      - name: Add .vscode directory
        mkdir: intro_to_genui/.vscode
      - name: Add .vscode/launch.json
        path: intro_to_genui/.vscode/launch.json
        replace-contents: |
          {
              // Use IntelliSense to learn about possible attributes.
              // Hover to view descriptions of existing attributes.
              // For more information, visit: https://go.microsoft.com/fwlink/?linkid=830387
              "version": "0.2.0",
              "configurations": [
                  {
                      "name": "intro_to_genui",
                      "request": "launch",
                      "type": "dart"
                  }
              ]
          }
      - name: Replace lib/main.dart
        path: intro_to_genui/lib/main.dart
        replace-contents: |
          import 'package:firebase_ai/firebase_ai.dart';
          import 'package:firebase_core/firebase_core.dart';
          import 'package:flutter/material.dart';

          import 'firebase_options.dart';
          import 'message_bubble.dart';

          Future<void> main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await Firebase.initializeApp(options: DefaultFirebaseOptions.currentPlatform);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Just Today',
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
                ),
                home: const MyHomePage(),
              );
            }
          }

          class MyHomePage extends StatefulWidget {
            const MyHomePage({super.key});

            @override
            State<MyHomePage> createState() => _MyHomePageState();
          }

          sealed class ConversationItem {}

          class TextItem extends ConversationItem {
            final String text;
            final bool isUser;
            TextItem({required this.text, this.isUser = false});
          }

          class _MyHomePageState extends State<MyHomePage> {
            final List<ConversationItem> _items = [];
            final _textController = TextEditingController();
            final _scrollController = ScrollController();
            late final ChatSession _chatSession;

            @override
            void initState() {
              super.initState();
              final model = FirebaseAI.googleAI().generativeModel(
                model: 'gemini-3-flash-preview',
              );
              _chatSession = model.startChat();
              _chatSession.sendMessage(Content.text(systemInstruction));
            }

            void _scrollToBottom() {
              WidgetsBinding.instance.addPostFrameCallback((_) {
                if (_scrollController.hasClients) {
                  _scrollController.animateTo(
                    _scrollController.position.maxScrollExtent,
                    duration: const Duration(milliseconds: 300),
                    curve: Curves.easeOut,
                  );
                }
              });
            }

            @override
            void dispose() {
              _textController.dispose();
              _scrollController.dispose();
              super.dispose();
            }

            Future<void> _addMessage() async {
              final text = _textController.text;

              if (text.trim().isEmpty) {
                return;
              }
              _textController.clear();

              setState(() {
                _items.add(TextItem(text: text, isUser: true));
              });

              _scrollToBottom();

              final response = await _chatSession.sendMessage(Content.text(text));

              if (response.text?.isNotEmpty ?? false) {
                setState(() {
                  _items.add(TextItem(text: response.text!, isUser: false));
                });
                _scrollToBottom();
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  backgroundColor: Theme.of(context).colorScheme.inversePrimary,
                  title: const Text('Just Today'),
                ),
                body: Column(
                  children: [
                    Expanded(
                      child: ListView(
                        controller: _scrollController,
                        padding: const EdgeInsets.all(16),
                        children: [
                          for (final item in _items)
                            switch (item) {
                              TextItem() => MessageBubble(
                                text: item.text,
                                isUser: item.isUser,
                              ),
                            },
                        ],
                      ),
                    ),
                    SafeArea(
                      child: Padding(
                        padding: const EdgeInsets.symmetric(horizontal: 16.0),
                        child: Row(
                          children: [
                            Expanded(
                              child: TextField(
                                controller: _textController,
                                onSubmitted: (_) => _addMessage(),
                                decoration: const InputDecoration(
                                  hintText: 'Enter a message',
                                ),
                              ),
                            ),
                            const SizedBox(width: 8),
                            ElevatedButton(
                              onPressed: _addMessage,
                              child: const Text('Send'),
                            ),
                          ],
                        ),
                      ),
                    ),
                  ],
                ),
              );
            }
          }

          const systemInstruction = '''
            ## PERSONA
            You are an expert task planner.

            ## GOAL
            Work with me to produce a list of tasks that I should do today, and then track
            the completion status of each one.

            ## RULES
            Talk with me only about tasks that I should do today.
            Do not engage in conversation about any other topic.
            Do not offer suggestions unless I ask for them.
            Do not offer encouragement unless I ask for it.
            Do not offer advice unless I ask for it.
            Do not offer opinions unless I ask for them.

            ## PROCESS
            ### Planning
            * Ask me for information about tasks that I should do today.
            * Synthesize a list of tasks from that information.
            * Ask clarifying questions if you need to.
            * When you have a list of tasks that you think I should do today, present it
              to me for review.
            * Respond to my suggestions for changes, if I have any, until I accept the
              list.

            ### Tracking
            * Once the list is accepted, ask me to let you know when individual tasks are
              complete.
            * If I tell you a task is complete, mark it as complete.
            * Once all tasks are complete, send a message acknowledging that, and then
              end the conversation.
          ''';
      - name: Add lib/message_bubble.dart
        path: intro_to_genui/lib/message_bubble.dart
        replace-contents: |
          import 'package:flutter/material.dart';

          class MessageBubble extends StatelessWidget {
            final String text;
            final bool isUser;

            const MessageBubble({super.key, required this.text, required this.isUser});

            @override
            Widget build(BuildContext context) {
              final theme = Theme.of(context);
              final colorScheme = theme.colorScheme;

              final bubbleColor = isUser
                  ? colorScheme.primary
                  : colorScheme.surfaceContainerHighest;

              final textColor = isUser
                  ? colorScheme.onPrimary
                  : colorScheme.onSurfaceVariant;

              return Padding(
                padding: const EdgeInsets.symmetric(vertical: 6.0, horizontal: 8.0),
                child: Column(
                  crossAxisAlignment: isUser
                      ? CrossAxisAlignment.end
                      : CrossAxisAlignment.start,
                  children: [
                    Row(
                      mainAxisAlignment: isUser
                          ? MainAxisAlignment.end
                          : MainAxisAlignment.start,
                      children: [
                        Flexible(
                          child: Container(
                            padding: const EdgeInsets.symmetric(
                              horizontal: 16.0,
                              vertical: 12.0,
                            ),
                            decoration: BoxDecoration(
                              color: bubbleColor,
                              borderRadius: BorderRadius.only(
                                topLeft: const Radius.circular(20),
                                topRight: const Radius.circular(20),
                                bottomLeft: Radius.circular(isUser ? 20 : 0),
                                bottomRight: Radius.circular(isUser ? 0 : 20),
                              ),
                              boxShadow: [
                                BoxShadow(
                                  color: Colors.black.withAlpha(20),
                                  blurRadius: 4,
                                  offset: const Offset(0, 2),
                                ),
                              ],
                              gradient: isUser
                                  ? LinearGradient(
                                      colors: [
                                        colorScheme.primary,
                                        colorScheme.primary.withAlpha(200),
                                      ],
                                      begin: Alignment.topLeft,
                                      end: Alignment.bottomRight,
                                    )
                                  : null,
                            ),
                            child: Text(
                              text,
                              style: theme.textTheme.bodyLarge?.copyWith(
                                color: textColor,
                                height: 1.3,
                              ),
                            ),
                          ),
                        ),
                      ],
                    ),
                    const SizedBox(height: 2),
                  ],
                ),
              );
            }
          }
      - name: Add lib/firebase_options.dart
        path: intro_to_genui/lib/firebase_options.dart
        replace-contents: |
          // File generated by FlutterFire CLI.
          // ignore_for_file: lines_longer_than_80_chars, avoid_classes_with_only_static_members
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          /// Default [FirebaseOptions] for use with your Firebase apps.
          ///
          /// Example:
          /// ```dart
          /// import 'firebase_options.dart';
          /// // ...
          /// await Firebase.initializeApp(
          ///   options: DefaultFirebaseOptions.currentPlatform,
          /// );
          /// ```
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) {
                return web;
              }
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  throw UnsupportedError(
                    'DefaultFirebaseOptions have not been configured for Android - '
                    'you can reconfigure this by running the FlutterFire CLI again.',
                  );
                case TargetPlatform.iOS:
                  throw UnsupportedError(
                    'DefaultFirebaseOptions have not been configured for iOS - '
                    'you can reconfigure this by running the FlutterFire CLI again.',
                  );
                case TargetPlatform.macOS:
                  throw UnsupportedError(
                    'DefaultFirebaseOptions have not been configured for macos - '
                    'you can reconfigure this by running the FlutterFire CLI again.',
                  );
                case TargetPlatform.windows:
                  throw UnsupportedError(
                    'DefaultFirebaseOptions have not been configured for windows - '
                    'you can reconfigure this by running the FlutterFire CLI again.',
                  );
                case TargetPlatform.linux:
                  throw UnsupportedError(
                    'DefaultFirebaseOptions have not been configured for linux - '
                    'you can reconfigure this by running the FlutterFire CLI again.',
                  );
                default:
                  throw UnsupportedError(
                    'DefaultFirebaseOptions are not supported for this platform.',
                  );
              }
            }

            static const FirebaseOptions web = FirebaseOptions(
              apiKey: 'API KEY',
              appId: 'APP ID',
              messagingSenderId: 'SENDER ID',
              projectId: 'PROJECT ID',
              authDomain: 'example.firebaseapp.com',
              storageBucket: 'example.firebasestorage.app',
              measurementId: 'MEASUREMENT',
            );
          }
